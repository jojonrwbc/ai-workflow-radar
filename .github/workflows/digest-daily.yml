name: Daily Digest Run

on:
  schedule:
    - cron: "35 4 * * *"
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger digest endpoint
        env:
          APP_URL: ${{ secrets.AWR_APP_URL }}
          CRON_SECRET: ${{ secrets.AWR_CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Missing secrets: AWR_APP_URL or AWR_CRON_SECRET"
            exit 1
          fi
          curl --fail --show-error --silent \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$APP_URL/api/cron/digest"
